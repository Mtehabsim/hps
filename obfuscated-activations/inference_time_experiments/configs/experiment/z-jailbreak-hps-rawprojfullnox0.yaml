defaults:
    - z-jailbreak

metric: "HPSMetric"

# Apple-to-apple control for raw_proj_full: identical mean-pool-then-LR pipeline
# on the full 4096-dim activation, but WITHOUT the x0 hyperbolic lift. Comparing
# this to raw_proj_full isolates the effect of the Lorentz radial coordinate
# (architecture held fixed).
metric_config:
    layers: [1, 7, 13, 19, 25, 32]
    kappa: 0.1
    proj_dim: 64
    hps_epochs: 50
    feature_set: "raw_proj_full_nox0"
