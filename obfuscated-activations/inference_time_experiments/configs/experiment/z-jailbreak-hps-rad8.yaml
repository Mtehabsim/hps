defaults:
    - z-jailbreak

metric: "HPSMetric"

# HPS using the 8-feature radial+displacement set (drops the 4 curvature features,
# which the ablation found least informative). Comparison point for the feature-set
# robustness test.
metric_config:
    layers: [1, 7, 13, 19, 25, 32]
    kappa: 0.1
    proj_dim: 64
    hps_epochs: 50
    feature_set: "radial_disp_8"
