defaults:
    - z-jailbreak

metric: "HPSMetric"

# HPS uses a spread subset of transformer layers. reps include the embedding
# layer at index 0, so transformer layers [0,6,12,18,24,31] -> indices below.
metric_config:
    layers: [1, 7, 13, 19, 25, 32]
    kappa: 0.1
    proj_dim: 64
    hps_epochs: 50
