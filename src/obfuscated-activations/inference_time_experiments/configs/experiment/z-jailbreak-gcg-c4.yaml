defaults:
    - zc-gcg-prompt

# Hard-token (GCG) attack against the C4 linear probe.
# Inherits zc-gcg-prompt: GCGOptimizer + Llama3HardPrompted + discrete-token search
# (search_width=512, topk=256), ProbePredictLoss, single-behavior data modules.
metric: "LogisticRegressionMetric"
tag: "gcg-c4"

# Train the probe on the FULL concept set (zc-hard-prompt's Single* concept module
# yields only one example, which can't fit a trainable probe). GCG still attacks a
# SINGLE behavior via the Single obfus module + example_idx; loop example_idx to
# aggregate across behaviors.
concept_data_module: "HIDHarmfulConceptDataModule"
example_idx: 0

metric_config:
    layers: [1, 7, 13, 19, 25, 32]
