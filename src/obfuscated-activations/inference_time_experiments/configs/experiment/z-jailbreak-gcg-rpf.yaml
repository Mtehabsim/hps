defaults:
    - zc-gcg-prompt

# Hard-token (GCG) attack against the PUREST "hyperbolic on hidden states" probe:
# lift the full 4096-dim activation onto the hyperboloid (raw_proj_full), mean-pool
# over layers, logistic regression. This is "C4 + the single x0 hyperbolic radial
# coordinate". Pair with z-jailbreak-gcg-rpfnox0 (identical pipeline WITHOUT the x0
# lift) to isolate whether hyperbolic geometry helps under hard-token attacks.
metric: "HPSMetric"
tag: "gcg-rpf"

concept_data_module: "HIDHarmfulConceptDataModule"
example_idx: 0

metric_config:
    layers: [1, 7, 13, 19, 25, 32]
    kappa: 0.1
    proj_dim: 64
    hps_epochs: 50
    feature_set: "raw_proj_full"
