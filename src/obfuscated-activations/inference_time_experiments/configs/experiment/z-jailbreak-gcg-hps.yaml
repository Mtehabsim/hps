defaults:
    - zc-gcg-prompt

# Hard-token (GCG) attack against the HPS hyperbolic probe.
# Inherits zc-gcg-prompt: GCGOptimizer + Llama3HardPrompted + discrete-token search
# (search_width=512, topk=256), ProbePredictLoss, single-behavior data modules.
metric: "HPSMetric"
tag: "gcg-hps"

# Train the probe on the FULL concept set; attack a SINGLE behavior (Single obfus
# module + example_idx). Loop example_idx to aggregate across behaviors.
concept_data_module: "HIDHarmfulConceptDataModule"
example_idx: 0

metric_config:
    layers: [1, 7, 13, 19, 25, 32]
    kappa: 0.1
    proj_dim: 64
    hps_epochs: 50
